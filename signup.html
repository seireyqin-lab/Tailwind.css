<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Premium Interface</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --default-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Ubuntu, "Helvetica Neue", Helvetica, Arial, "PingFang SC",
        "Hiragino Sans GB", "Microsoft Yahei UI", "Microsoft Yahei",
        "Source Han Sans CN", sans-serif;
    }

    body {
      font-family: var(--default-font-family);
      background-color: #0f172a; 
    }

    /* Container Utama sesuai ukuran request (814x458) */
    .main-container {
      position: relative;
      width: 814px;
      height: 458px;
      margin: 0 auto;
      background: url(https://codia-f2c.s3.us-west-1.amazonaws.com/image/2026-03-04/jDt8SdTRDv.png) no-repeat center;
      background-size: cover;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* Hilangkan outline default */
    input, select, textarea, button {
      outline: 0 !important;
    }

    /* Efek Input Transparan (Glassmorphism) */
    .glass-input {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="main-container rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center justify-center md:justify-start overflow-hidden">
    
    <div class="absolute inset-0 bg-gradient-to-r from-black/60 to-transparent"></div>

    <div class="relative z-10 w-full max-w-[360px] ml-0 md:ml-12 p-8 bg-white/10 backdrop-blur-2xl rounded-3xl border border-white/20 shadow-2xl mx-4 transform transition-all">
      
      <div class="mb-6">
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Join Us</h2>
        <p class="text-blue-100/60 text-xs mt-1">Daftar sekarang untuk mulai berpetualang.</p>
      </div>

      <form action="#" class="space-y-4">
        <div class="group">
          <label class="block text-white text-[10px] uppercase font-black tracking-[0.15em] mb-1.5 ml-1 opacity-70 group-focus-within:opacity-100 transition-opacity">Nama Lengkap</label>
          <input type="text" placeholder="Masukkan nama" 
            class="glass-input w-full px-4 py-3 rounded-2xl text-white placeholder-white/30 text-sm">
        </div>

        <div class="group">
          <label class="block text-white text-[10px] uppercase font-black tracking-[0.15em] mb-1.5 ml-1 opacity-70 group-focus-within:opacity-100 transition-opacity">Email</label>
          <input type="email" placeholder="name@email.com" 
            class="glass-input w-full px-4 py-3 rounded-2xl text-white placeholder-white/30 text-sm">
        </div>

        <div class="group">
          <label class="block text-white text-[10px] uppercase font-black tracking-[0.15em] mb-1.5 ml-1 opacity-70 group-focus-within:opacity-100 transition-opacity">Password</label>
          <input type="password" placeholder="••••••••" 
            class="glass-input w-full px-4 py-3 rounded-2xl text-white placeholder-white/30 text-sm">
        </div>

        <div class="pt-3">
          <button type="submit" 
            class="w-full bg-white text-gray-900 font-black py-3.5 rounded-2xl hover:bg-opacity-90 hover:scale-[1.02] transition-all active:scale-95 shadow-[0_10px_20px_rgba(255,255,255,0.1)] uppercase text-xs tracking-widest">
            Create Account
          </button>
        </div>
      </form>

      <div class="mt-6 text-center">
        <p class="text-white/50 text-xs font-medium">
          Sudah punya akun? 
          <a href="index.html" class="text-white font-bold hover:text-blue-200 transition-colors ml-1 decoration-dotted underline underline-offset-4">Log in</a>
        </p>
      </div>

    </div>

    <div class="hidden md:flex flex-1 items-center justify-center p-12 relative z-10 select-none">
       <div class="text-white/20 rotate-90 origin-center absolute -right-20 pointer-events-none">
          <h1 class="text-7xl font-black italic uppercase tracking-tighter">SIGNUP</h1>
       </div>
    </div>

  </div>

</body>
</html>
