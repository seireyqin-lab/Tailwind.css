<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Premium Interface</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --default-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { font-family: var(--default-font-family); }
    .bg-custom-image {
      background: url('https://codia-f2c.s3.us-west-1.amazonaws.com/image/2026-03-04/X3OD7cXSAq.png') no-repeat center;
      background-size: cover;
    }
  </style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">

  <div class="main-container bg-custom-image relative w-[844px] h-[475px] rounded-2xl shadow-2xl overflow-hidden flex items-center justify-end pr-16">
    <div class="absolute inset-0 bg-black/30"></div>

    <div class="relative z-10 w-full max-w-[350px] bg-white/10 backdrop-blur-md p-8 rounded-2xl border border-white/20 shadow-xl">
      <div class="mb-8 text-center">
        <h2 class="text-3xl font-bold text-white tracking-tight">Login</h2>
        <p class="text-gray-200 text-sm mt-2">Selamat datang kembali!</p>
      </div>

      <form action="#" class="space-y-5">
        <div>
          <label class="block text-white text-xs font-semibold uppercase mb-1 ml-1">Email Address</label>
          <input type="email" required placeholder="email@example.com" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
        </div>
        <div>
          <label class="block text-white text-xs font-semibold uppercase mb-1 ml-1">Password</label>
          <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl shadow-lg transform transition active:scale-95">Sign In</button>
      </form>

      <div class="mt-6 text-center text-sm">
        <a href="#" class="text-gray-200 hover:text-white transition">Forgot password?</a>
        <p class="text-gray-300 mt-2">
          Belum punya akun? <a href="signup.html" class="text-blue-400 font-bold hover:underline">Daftar</a>
        </p>
      </div>
    </div>
  </div>

</body>
</html>
